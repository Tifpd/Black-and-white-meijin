<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black and White Meijin Standings</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 10px; }
        
        .scoring-info { background: #eef2ff; border-left: 5px solid #4f46e5; padding: 15px; margin: 20px 0; border-radius: 4px; font-size: 0.95em; }
        .scoring-info strong { color: #4f46e5; }

        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 25px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.05em; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f1f5f9; }
        
        .total-cell { color: #1a1a1a; font-size: 1.1em; }
        .split-points { color: #64748b; font-size: 0.9em; }
        .player-nick { font-weight: 600; color: #2563eb; }
        
        .footer { text-align: center; margin-top: 30px; font-size: 0.85em; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Black and White Meijin</h1>
    
    <div class="scoring-info">
        <strong>Scoring System:</strong> Total Score = Tournament Points (TP) + Position Bonus (PB).<br>
        <em>Bonuses awarded per tournament: 1st: <strong>+9</strong>, 2nd: <strong>+5</strong>, 3rd: <strong>+3</strong>.</em>
    </div>

    <select id="season-select" onchange="loadSeasonData()"></select>
    
    <div id="table-container">
        </div>

    <div class="footer">
        Automatically updated via GitHub Actions | Powered by PlayOK Data
    </div>
</div>

<script>
    let globalData = null;

    // Load data.json
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            globalData = data;
            const select = document.getElementById('season-select');
            
            // Step 3: Filter out 2025-H1 and sort seasons
            const seasons = Object.keys(data.seasons)
                .filter(s => s !== "2025-H1")
                .sort((a, b) => b.localeCompare(a));

            seasons.forEach(s => {
                const option = document.createElement('option');
                option.value = s;
                // Format label: 2026-H1 -> 2026 Black Meijin (BM)
                const label = s.includes('H1') ? s.replace('-H1', ' Black Meijin (BM)') : s.replace('-H2', ' White Meijin (WM)');
                option.textContent = label;
                select.appendChild(option);
            });

            if (seasons.length > 0) loadSeasonData();
        });

    function loadSeasonData() {
        const selectedSeason = document.getElementById('season-select').value;
        const container = document.getElementById('table-container');
        
        if (!globalData || !globalData.seasons[selectedSeason]) return;

        const players = globalData.seasons[selectedSeason].players;
        
        // Step 1: Sort by Total (b + bonus)
        const sortedPlayers = Object.entries(players).sort((a, b) => {
            const totalA = a[1].b + (a[1].bonus || 0);
            const totalB = b[1].b + (b[1].bonus || 0);
            return totalB - totalA;
        });

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Total Score</th>
                        <th>TP + Bonus</th>
                        <th>Played</th>
                    </tr>
                </thead>
                <tbody>
        `;

        sortedPlayers.forEach(([nick, stats], index) => {
            const total = stats.b + (stats.bonus || 0);
            const bonus = stats.bonus || 0;
            
            html += `
                <tr>
                    <td>${index + 1}.</td>
                    <td class="player-nick">${nick}</td>
                    <td class="total-cell"><strong>${total.toFixed(1)}</strong></td>
                    <td class="split-points">${stats.b.toFixed(1)} <span style="color:#94a3b8">+</span> ${bonus}</td>
                    <td>${stats.u}</td>
                </tr>
            `;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }
</script>

</body>
</html>
