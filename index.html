<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black and White Meijin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --text-main: #1a1a1a; 
            --text-dim: #cccccc; 
            --gold: #d4af37;
            --silver: #a0a0a0;
            --bronze: #cd7f32;
            --border: #f2f2f2;
            --accent-bm: #1a1a1a; /* Černá pro BM */
            --accent-wm: #b08d57; /* Zlatohnědá pro WM */
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 15px; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 { 
            font-family: 'Cinzel', serif; 
            text-align: center; 
            font-size: 2.2em; 
            letter-spacing: 8px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 20px; 
        }
        
        #season-selector { 
            text-align: center; 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            flex-wrap: wrap;
        }

        .season-btn { 
            background: none; 
            border: none; 
            font-family: 'Cinzel', serif; 
            cursor: pointer; 
            font-size: 1.1em; 
            padding: 8px 15px; 
            opacity: 0.3;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
            font-weight: 700;
        }

        /* Barevné styly pro tlačítka */
        .btn-bm { color: var(--accent-bm); }
        .btn-wm { color: var(--accent-wm); }

        .season-btn.active.btn-bm { 
            opacity: 1; 
            border-bottom-color: var(--accent-bm); 
        }
        .season-btn.active.btn-wm { 
            opacity: 1; 
            border-bottom-color: var(--accent-wm); 
        }

        table { width: 100%; border-collapse: collapse; }

        th { 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-size: 0.7em; 
            padding: 15px; 
            color: var(--text-dim); 
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td { 
            padding: 22px 15px; 
            border-bottom: 1px solid var(--border); 
            font-size: 1.1em;
        }

        .rank-cell { width: 60px; font-weight: 800; font-size: 1.4em; }
        
        .rank-1 .rank-cell { color: var(--gold); }
        .rank-2 .rank-cell { color: var(--silver); }
        .rank-3 .rank-cell { color: var(--bronze); }
        .rank-other .rank-cell { color: var(--text-dim); }

        .nick { font-weight: 600; color: var(--text-main); }
        .score-cell { font-weight: 700; text-align: right; font-size: 1.2em; }
        .participation { text-align: right; color: var(--text-dim); font-size: 1.1em; width: 120px; }

        @media (max-width: 600px) {
            td, th { padding: 15px 10px; font-size: 0.9em; }
            .rank-cell { width: 40px; font-size: 1.1em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Black and White Meijin</h1>
    <div id="season-selector"></div>

    <table>
        <thead>
            <tr>
                <th class="rank-cell">RANK</th>
                <th>PLAYER</th>
                <th style="text-align: right;">POINTS</th>
                <th style="text-align: right;">TOURNAMENTS</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    let globalStore = {};

    // Pomocná funkce pro převod ID sezóny na hezký název
    function formatSeasonName(key) {
        const [year, half] = key.split('-');
        return half === 'H1' ? `BM ${year}` : `WM ${year}`;
    }

    function switchSeason(seasonKey) {
        const b = document.getElementById('body');
        b.innerHTML = "";
        
        const seasonData = globalStore.seasons[seasonKey];
        if (!seasonData) return;

        const sorted = Object.entries(seasonData.players).sort((a, b) => b[1].b - a[1].b);
        
        sorted.forEach((h, i) => {
            const rank = i + 1;
            const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';

            b.innerHTML += `
                <tr class="${rankClass}">
                    <td class="rank-cell">${rank}.</td>
                    <td><span class="nick">${h[0]}</span></td>
                    <td class="score-cell">${h[1].b.toFixed(1)}</td>
                    <td class="participation">${h[1].u}</td>
                </tr>`;
        });

        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-key') === seasonKey);
        });
    }

    fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(store => {
            globalStore = store;
            const selector = document.getElementById('season-selector');
            const seasons = Object.keys(store.seasons || {}).sort().reverse();

            seasons.forEach(s => {
                const btn = document.createElement('button');
                const isH1 = s.includes('H1');
                
                btn.innerText = formatSeasonName(s);
                btn.className = `season-btn ${isH1 ? 'btn-bm' : 'btn-wm'}`;
                btn.setAttribute('data-key', s);
                btn.onclick = () => switchSeason(s);
                selector.appendChild(btn);
            });

            if (seasons.length > 0) switchSeason(seasons[0]);
        });
</script>

</body>
</html>
