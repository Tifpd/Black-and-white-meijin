<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black and White Meijin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #f5f5f5; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-family: 'Cinzel', serif; text-align: center; font-size: 2.2em; letter-spacing: 6px; margin-bottom: 40px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 20px; }
        
        #season-selector { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .season-btn { background: none; border: none; font-family: 'Cinzel', serif; cursor: pointer; font-size: 1em; padding: 8px 15px; transition: 0.3s; color: #000; border-bottom: 2px solid transparent; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75em; padding: 12px; border-bottom: 1px solid #eee; color: #888; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #fcfcfc; }
        tr:hover { background: var(--accent); }
        .rank { font-weight: bold; width: 40px; }
        .nick { font-family: 'Cinzel', serif; font-weight: 700; color: #000; }
        .score-cell { font-weight: bold; text-align: right; }
        .participation { text-align: right; color: #aaa; font-size: 0.85em; }
        .empty-msg { text-align: center; padding: 50px; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Black and White Meijin</h1>
    
    <div id="season-selector"></div>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th style="text-align: right;">Points</th>
                <th style="text-align: right;">Tournaments</th>
            </tr>
        </thead>
        <tbody id="body">
            </tbody>
    </table>
</div>

<script>
    let globalStore = {};

    function switchSeason(seasonKey) {
        const b = document.getElementById('body');
        b.innerHTML = "";
        
        const seasonData = globalStore.seasons[seasonKey];
        if (!seasonData || !seasonData.players || Object.keys(seasonData.players).length === 0) {
            b.innerHTML = "<tr><td colspan='4' class='empty-msg'>No data for this season yet.</td></tr>";
        } else {
            const sorted = Object.entries(seasonData.players).sort((a, b) => b[1].b - a[1].b);
            sorted.forEach((h, i) => {
                b.innerHTML += `
                    <tr>
                        <td class="rank">${i+1}.</td>
                        <td><span class="nick">${h[0]}</span></td>
                        <td class="score-cell">${h[1].b.toFixed(1)}</td>
                        <td class="participation">${h[1].u}</td>
                    </tr>`;
            });
        }

        // Vizuální označení aktivního tlačítka
        document.querySelectorAll('.season-btn').forEach(btn => {
            if (btn.innerText === seasonKey) {
                btn.style.opacity = "1";
                btn.style.borderBottom = "2px solid black";
                btn.style.fontWeight = "bold";
            } else {
                btn.style.opacity = "0.3";
                btn.style.borderBottom = "2px solid transparent";
                btn.style.fontWeight = "normal";
            }
        });
    }

    fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(store => {
            globalStore = store;
            const selector = document.getElementById('season-selector');
            const seasons = Object.keys(store.seasons || {}).sort().reverse();

            if (seasons.length === 0) {
                document.getElementById('body').innerHTML = "<tr><td colspan='4' class='empty-msg'>Awaiting automated update...</td></tr>";
                return;
            }

            seasons.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = s;
                btn.className = 'season-btn';
                btn.onclick = () => switchSeason(s);
                selector.appendChild(btn);
            });

            switchSeason(seasons[0]);
        })
        .catch(err => {
            document.getElementById('body').innerHTML = "<tr><td colspan='4' class='empty-msg'>Error loading data.json.</td></tr>";
        });
</script>

</body>
</html>
