<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black and White Meijin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --text-main: #1a1a1a; 
            --text-dim: #cccccc; 
            --gold: #d4af37;
            --silver: #a0a0a0;
            --bronze: #cd7f32;
            --border: #f2f2f2;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 15px; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 { 
            font-family: 'Cinzel', serif; 
            text-align: center; 
            font-size: 2.2em; 
            letter-spacing: 8px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 20px; 
        }
        
        #season-selector { 
            text-align: center; 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
        }

        .season-btn { 
            background: none; 
            border: none; 
            font-family: 'Cinzel', serif; 
            cursor: pointer; 
            font-size: 1em; 
            color: #000; 
            border-bottom: 2px solid transparent; 
            opacity: 0.3;
            transition: 0.3s;
        }

        /* Hlavní tabulka podle screenshotu */
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }

        th { 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-size: 0.7em; 
            padding: 15px; 
            color: var(--text-dim); 
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td { 
            padding: 25px 15px; 
            border-bottom: 1px solid var(--border); 
            font-size: 1.1em;
        }

        /* Pořadí (Rank) */
        .rank-cell { 
            width: 60px; 
            font-weight: 800; 
            font-size: 1.4em;
        }
        
        /* Barvy pro první tři */
        .rank-1 .rank-cell { color: var(--gold); }
        .rank-2 .rank-cell { color: var(--silver); }
        .rank-3 .rank-cell { color: var(--bronze); }
        .rank-other .rank-cell { color: var(--text-dim); }

        /* Jméno hráče */
        .nick { 
            font-weight: 600; 
            color: var(--text-main);
        }

        /* Body */
        .score-cell { 
            font-weight: 700; 
            text-align: right; 
            font-size: 1.2em;
        }

        /* Počet turnajů */
        .participation { 
            text-align: right; 
            color: var(--text-dim); 
            font-size: 1.1em;
            width: 120px;
        }

        /* Aktivní tlačítko sezóny */
        .season-btn.active {
            opacity: 1;
            border-bottom: 2px solid #000;
        }

        @media (max-width: 600px) {
            td, th { padding: 15px 10px; font-size: 0.9em; }
            .rank-cell { width: 40px; font-size: 1.1em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Black and White Meijin</h1>
    
    <div id="season-selector"></div>

    <table>
        <thead>
            <tr>
                <th class="rank-cell">RANK</th>
                <th>PLAYER</th>
                <th style="text-align: right;">POINTS</th>
                <th style="text-align: right;">TOURNAMENTS</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    let globalStore = {};

    function switchSeason(seasonKey) {
        const b = document.getElementById('body');
        b.innerHTML = "";
        
        const seasonData = globalStore.seasons[seasonKey];
        if (!seasonData) return;

        const sorted = Object.entries(seasonData.players).sort((a, b) => b[1].b - a[1].b);
        
        sorted.forEach((h, i) => {
            const rank = i + 1;
            const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';

            b.innerHTML += `
                <tr class="${rankClass}">
                    <td class="rank-cell">${rank}.</td>
                    <td><span class="nick">${h[0]}</span></td>
                    <td class="score-cell">${h[1].b.toFixed(1)}</td>
                    <td class="participation">${h[1].u}</td>
                </tr>`;
        });

        // Přepínání aktivního vzhledu tlačítek
        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === seasonKey);
        });
    }

    fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(store => {
            globalStore = store;
            const selector = document.getElementById('season-selector');
            const seasons = Object.keys(store.seasons || {}).sort().reverse();

            seasons.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = s;
                btn.className = 'season-btn';
                btn.onclick = () => switchSeason(s);
                selector.appendChild(btn);
            });

            if (seasons.length > 0) switchSeason(seasons[0]);
        });
</script>

</body>
</html>
