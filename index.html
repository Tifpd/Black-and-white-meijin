<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black and White Meijin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #1a1a1a; 
            --accent: #fcfcfc; 
            --gold: #d4af37;
            --silver: #aaa9ad;
            --bronze: #cd7f32;
            --border: #f0f0f0;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 15px; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 850px; margin: 0 auto; }

        h1 { 
            font-family: 'Cinzel', serif; 
            text-align: center; 
            font-size: clamp(1.8em, 6vw, 2.8em); 
            letter-spacing: 8px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
            border-bottom: 3px solid #000; 
            padding-bottom: 25px; 
        }
        
        #season-selector { 
            text-align: center; 
            margin-bottom: 45px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 20px; 
        }

        .season-btn { 
            background: none; 
            border: none; 
            font-family: 'Cinzel', serif; 
            cursor: pointer; 
            font-size: 1.1em; 
            padding: 5px 10px; 
            transition: all 0.3s ease; 
            color: #000; 
            border-bottom: 2px solid transparent; 
            opacity: 0.3;
        }

        /* Design tabulky */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
        }

        th { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-size: 0.75em; 
            padding: 20px 15px; 
            border-bottom: 2px solid #000; 
            color: #999; 
            text-align: left; 
        }

        td { 
            padding: 18px 15px; 
            border-bottom: 1px solid var(--border); 
            font-size: 1em;
            vertical-align: middle;
        }

        tr:hover { background: var(--accent); }

        /* Stylování pořadí */
        .rank-cell { width: 60px; text-align: center; }
        
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.9em;
            font-family: 'Cinzel', serif;
        }

        /* Medaile */
        .rank-1 .badge { background: var(--gold); color: white; box-shadow: 0 2px 4px rgba(212,175,55,0.3); }
        .rank-2 .badge { background: var(--silver); color: white; box-shadow: 0 2px 4px rgba(170,169,173,0.3); }
        .rank-3 .badge { background: var(--bronze); color: white; box-shadow: 0 2px 4px rgba(205,127,50,0.3); }
        .rank-other { color: #bbb; font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 0.9em; }

        /* Jméno hráče */
        .nick { 
            font-weight: 600; 
            color: #1a1a1a; 
            font-size: 1.05em;
            letter-spacing: -0.2px;
        }

        .score-cell { 
            font-weight: 700; 
            text-align: right; 
            font-size: 1.1em;
            color: #000;
        }

        .participation { 
            text-align: right; 
            color: #aaa; 
            font-size: 0.85em;
            font-weight: 400;
        }

        @media (max-width: 500px) {
            td, th { padding: 12px 10px; }
            .rank-cell { width: 45px; }
            h1 { letter-spacing: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Black and White Meijin</h1>
    
    <div id="season-selector"></div>

    <table>
        <thead>
            <tr>
                <th class="rank-cell">#</th>
                <th>Hráč</th>
                <th style="text-align: right;">Body</th>
                <th style="text-align: right;">Turnaje</th>
            </tr>
        </thead>
        <tbody id="body">
            </tbody>
    </table>
</div>

<script>
    let globalStore = {};

    function switchSeason(seasonKey) {
        const b = document.getElementById('body');
        b.innerHTML = "";
        
        const seasonData = globalStore.seasons[seasonKey];
        if (!seasonData || !seasonData.players) {
            b.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 50px; color: #ccc;'>Data nejsou k dispozici.</td></tr>";
            return;
        }

        const sorted = Object.entries(seasonData.players).sort((a, b) => b[1].b - a[1].b);
        
        sorted.forEach((h, i) => {
            const rank = i + 1;
            let rankHtml = "";
            
            if (rank <= 3) {
                rankHtml = `<div class="badge">${rank}</div>`;
            } else {
                rankHtml = `<span class="rank-other">${rank}.</span>`;
            }

            b.innerHTML += `
                <tr class="rank-${rank <= 3 ? rank : 'normal'}">
                    <td class="rank-cell">${rankHtml}</td>
                    <td><span class="nick">${h[0]}</span></td>
                    <td class="score-cell">${h[1].b.toFixed(1)}</td>
                    <td class="participation">${h[1].u}×</td>
                </tr>`;
        });

        document.querySelectorAll('.season-btn').forEach(btn => {
            if (btn.innerText === seasonKey) {
                btn.style.opacity = "1";
                btn.style.borderBottom = "2px solid black";
                btn.style.transform = "translateY(-2px)";
            } else {
                btn.style.opacity = "0.3";
                btn.style.borderBottom = "2px solid transparent";
                btn.style.transform = "translateY(0)";
            }
        });
    }

    fetch('data.json?t=' + Date.now())
        .then(r => r.json())
        .then(store => {
            globalStore = store;
            const selector = document.getElementById('season-selector');
            const seasons = Object.keys(store.seasons || {}).sort().reverse();

            seasons.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = s;
                btn.className = 'season-btn';
                btn.onclick = () => switchSeason(s);
                selector.appendChild(btn);
            });

            if (seasons.length > 0) switchSeason(seasons[0]);
        });
</script>

</body>
</html>
